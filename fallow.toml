# fallow.toml - dead code analysis configuration
# Cross-platform; complementary to knip (overlap exists).

[detect]
unused_files = true
unused_exports = true
unused_dependencies = true
unused_dev_dependencies = true
unused_types = true
# `bun` is a Bun runtime built-in (resolves via @types/bun); not an npm package.
# Disabling the unlisted-deps check avoids a permanent false positive.
unlisted_dependencies = false
